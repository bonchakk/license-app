version: '5.1.3'

services:
  license-service:
    image: license:0.0.1-SNAPSHOT

    ports:
      - "8080:8080"
    
    environment:
      SPRING_PROFILES_ACTIVE: "dev"
      SPRING_CLOUD_CONFIG_URI: http://host.docker.internal:8071

    networks:
      backend:
        aliases:
          - "license-service"

networks:
  backend:
    driver: bridge